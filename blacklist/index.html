<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Lista Negra SV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="https://images.wikidexcdn.net/mwuploads/wikidex/1/1c/latest/20100124122554/Politoed_mini.png" type="image/png">
  <style>
    body {
  background: url("https://wallpapers.com/images/high/poliwag-with-poliwhirl-and-politoed-kaddk25y76fsd356.webp") no-repeat center center fixed;
  background-size: cover;
  font-family: 'Inter', sans-serif;
}

    .app-header {
      background: #111827;
      color: white;
      padding: 16px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .card {
      border: none;
      border-radius: 18px;
    }

    .card-glass {
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(10px);
    }

    .table-container {
      max-height: 320px;
      overflow-y: auto;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .table thead {
      background: #111827;
      color: white;
    }

    .table-hover tbody tr:hover {
      background-color: rgba(0,0,0,0.04);
    }

    .input-group-text {
      background: #f1f5f9;
    }

    .form-control {
      border-radius: 10px;
    }

    .loader-wrapper {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .spinner-border {
      width: 3.5rem;
      height: 3.5rem;
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>

<body>

<div class="app-header">
  <div class="container d-flex justify-content-between align-items-center">

    <h5 class="mb-0 fw-semibold text-white">
      Lista Negra Pokémon SV
    </h5>

    <a href="https://sooramaru.xyz/discord" target="_blank" class="btn btn-primary d-flex align-items-center gap-2">
      <i class="bi bi-discord"></i>
      Unirse al Discord
    </a>
  </div>
</div>

<!-- Main -->
<div id="content" class="container py-5 d-none" style="max-width: 900px;">

  <div class="card card-glass shadow-lg p-4">

    <!-- Título -->
    <div class="mb-4 text-center">
      <h5 class="fw-bold mb-1">Buscar en la lista negra</h5>
      <p class="subtitle mb-0">Encuentra entrenadores, IDs o usuarios de Discord reportados</p>
      <p>Sooramaru 2026 - Fork by tswann89</p>
    </div>

    <!-- Inputs -->
    <div class="row g-3 mb-4">

      <div class="col-md-4">
        <label class="form-label fw-semibold small">OT</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="ot-search-timeout" class="form-control" placeholder="Nombre del entrenador">
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">TID</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-hash"></i></span>
          <input type="text" id="id-search-timeout" class="form-control" placeholder="000000">
        </div>
      </div>

      <div class="col-md-4">
        <label class="form-label fw-semibold small">Discord</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-discord"></i></span>
          <input type="text" id="discord-search-timeout" class="form-control" placeholder="usuario#1234">
        </div>
      </div>

    </div>

    <!-- Resultados -->
    <div class="d-flex justify-content-between align-items-center mb-2">
      <span id="result-label" class="fw-semibold">Resultados (0)</span>
      <span class="subtitle">La búsqueda inicia automáticamente</span>
    </div>

    <div class="table-container border rounded-3">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th>OT</th>
            <th>TID</th>
            <th>Motivo</th>
            <th>Discord</th>
          </tr>
        </thead>
        <tbody id="results"></tbody>
      </table>
    </div>

  </div>

</div>

<!-- SCRIPTS -->
<script src="https://www.google.com/jsapi"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="./gooss.js"></script>
<script src="https://unpkg.com/fuse.js@6.4.1"></script>
<!-- TU JS ORIGINAL -->
<script>
  var bl = [];
  $(function() {$(function() {

  gooss.data({
    Blacklist: {
      url: "https://docs.google.com/spreadsheets/d/109kMvNsp36LcpFEXmrF5B87VIbcELrzqBBmkcDqKAzQ/edit?usp=drivesdk",
      index: 0,
    },
  },
  function(err, data) {
    if (err) return alert(err);

    bl = data.Blacklist.sort(function(a, b) {
      if (a.OT < b.OT) return -1;
      if (a.OT > b.OT) return 1;
      return 0;
    });

    updateResults(bl.length);
    $("#loader").addClass("d-none");
    $("#content").removeClass("d-none");

    var $results = $("#results");
    for (var entry of bl) {
      $results.append(formatEntry(entry));
    }
  });

  // 🔥 MUEVE TODO ESTO ADENTRO ↓↓↓

  $("#ot-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];
    for (var i in testArr) {
      if (i < 12) resultArr.push(testArr[i]);
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#id-search-timeout").prop("disabled", false);
      $("#discord-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#id-search-timeout").prop("disabled", true).val("");
      $("#discord-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchOT, maxTime);
    }
  });

  $("#id-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];
    var isNum = new RegExp("[0-9]+");

    for (var i in testArr) {
      if (isNum.test(testArr[i]) && i < 6) {
        resultArr.push(testArr[i]);
      }
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#ot-search-timeout").prop("disabled", false);
      $("#discord-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#ot-search-timeout").prop("disabled", true).val("");
      $("#discord-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchID, maxTime);
    }
  });

  $("#discord-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];

    for (var i in testArr) {
      if (i < 20) resultArr.push(testArr[i]);
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#id-search-timeout").prop("disabled", false);
      $("#ot-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#id-search-timeout").prop("disabled", true).val("");
      $("#ot-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchDiscord, maxTime);
    }
  });

});});

  var timer;
  var maxTime = 2000;
  var $results = $("#results");

  // ===== BUSCAR OT =====
  $("#ot-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];
    for (var i in testArr) {
      if (i < 12) resultArr.push(testArr[i]);
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#id-search-timeout").prop("disabled", false);
      $("#discord-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#id-search-timeout").prop("disabled", true).val("");
      $("#discord-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchOT, maxTime);
    }
  });

  function searchOT() {
    $results.html("");

    var fuse = new Fuse(bl, {
      includeScore: true,
      threshold: 0.3,
      keys: ["OT"],
    });

    var search = fuse.search($("#ot-search-timeout").val());

    for (var entry of bl) {
      if (entry.OT && entry.OT.includes("Multiple")) search.push(entry);
    }

    var i = 0;
    for (var result of search) {
      addToTable(result, $results);
      i++;
    }
    updateResults(i);
  }

  // ===== BUSCAR ID =====
  $("#id-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];
    var isNum = new RegExp("[0-9]+");

    for (var i in testArr) {
      if (isNum.test(testArr[i]) && i < 6) {
        resultArr.push(testArr[i]);
      }
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#ot-search-timeout").prop("disabled", false);
      $("#discord-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#ot-search-timeout").prop("disabled", true).val("");
      $("#discord-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchID, maxTime);
    }
  });

  function searchID() {
    $results.html("");

    var fuse = new Fuse(bl, {
      includeScore: true,
      threshold: 0.3,
      keys: ["ID #s"],
    });

    var search = fuse.search($("#id-search-timeout").val());

    for (var entry of bl) {
      if (entry["ID #s"] && entry["ID #s"].includes("IDs")) search.push(entry);
    }

    var i = 0;
    for (var result of search) {
      addToTable(result, $results);
      i++;
    }
    updateResults(i);
  }

  // ===== BUSCAR DISCORD =====
  $("#discord-search-timeout").keyup(function() {
    var testArr = $(this).val().split("");
    var resultArr = [];

    for (var i in testArr) {
      if (i < 20) resultArr.push(testArr[i]);
      $(this).val(resultArr.join(""));
    }

    if ($(this).val().trim() == "") {
      $results.html("");
      for (var entry of bl) {
        $results.append(formatEntry(entry));
      }
      $("#id-search-timeout").prop("disabled", false);
      $("#ot-search-timeout").prop("disabled", false);
      updateResults(bl.length);
    } else {
      $("#id-search-timeout").prop("disabled", true).val("");
      $("#ot-search-timeout").prop("disabled", true).val("");

      clearTimeout(timer);
      timer = setTimeout(searchDiscord, maxTime);
    }
  });

  function searchDiscord() {
    $results.html("");

    var fuse = new Fuse(bl, {
      includeScore: true,
      threshold: 0.3,
      keys: ["Discord Username / UserID"],
    });

    var search = fuse.search($("#discord-search-timeout").val());

    var i = 0;
    for (var result of search) {
      addToTable(result, $results);
      i++;
    }
    updateResults(i);
  }

  function formatEntry(entry) {
    return "<tr>" +
      "<th>" + (entry.OT || "&mdash;") + "</th>" +
      "<td>" + (entry["ID #s"] || "&mdash;") + "</td>" +
      "<td>" + (entry["Reason / Comments"] || "&mdash;") + "</td>" +
      "<td>" + (entry["Discord Username / UserID"] || "&mdash;") + "</td>";
  }

  function updateResults(num) {
    $("#result-label").html("Resultados (" + num + ")");
  }

  function addToTable(result, $results) {
    var entry = result.item ? result.item : result;

    if (!$("#results").html().includes(formatEntry(entry))) {
      $results.append(formatEntry(entry));
    }
  }
</script>

</body>
</html>
